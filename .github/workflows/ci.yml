name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  api:
    name: API · typecheck + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: services/api/package-lock.json

      # `npm ci` runs the `prepare` script, which runs `prisma generate`.
      - run: npm ci

      - run: npm run typecheck

      - run: npm test
