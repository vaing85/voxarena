# VoxArena — local dev: Postgres (Supabase-compatible) + Redis
# Run: docker compose up -d
# DATABASE_URL=postgresql://postgres:postgres@localhost:5432/voxarena
# REDIS_URL=redis://localhost:6379

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: voxarena
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  pg_data:
  redis_data:
